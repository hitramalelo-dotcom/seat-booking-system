<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Seat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Book Seat</h1>
    <p id="eventInfo"></p>

    <div id="seats" class="seats-grid"></div>

    <input type="hidden" id="eventId" />
    <input type="hidden" id="seatId" />

    <div class="form-box">
      <input type="text" id="customerName" placeholder="Your name" />
      <input type="text" id="customerPhone" placeholder="Your phone" />
      <button onclick="bookSeat()">Book Now</button>
      <button onclick="goBack()">Back</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
